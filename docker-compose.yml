version: '3.8'

services:
  database:
    image: mariadb:10.11
    container_name: database_service
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: server_service
    restart: unless-stopped
    depends_on:
      - database
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql://${DB_USER}:${DB_PASSWORD}@database:3306/${DB_DATABASE}
    ports:
      - "${SERVER_PORT:-3000}:${SERVER_PORT:-3000}"
    networks:
      - app-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: client_service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${CLIENT_PORT:-5173}:${CLIENT_PORT:-5173}"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
